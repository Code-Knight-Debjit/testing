{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Anupam Bearings</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #ff6a00; --orange-dk: #a14000; --grad: linear-gradient(135deg,#a14000 0%,#ff6a00 100%); }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1208 50%, #1a0a00 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%; max-width: 420px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }
    .login-logo img { height: 48px; }
    .login-logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; }
    .login-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem;
    }
    .login-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.4rem; }
    .login-sub { font-size: 0.875rem; color: rgba(255,255,255,0.4); margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.4rem; }
    .form-input {
      width: 100%;
      padding: 0.825rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--orange); background: rgba(255,106,0,0.05); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--grad);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.2s, transform 0.2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
    .login-footer { text-align: center; margin-top: 2rem; font-size: 0.78rem; color: rgba(255,255,255,0.2); }
    .login-footer a { color: var(--orange); text-decoration: none; }
    /* Decorative ring */
    .login-ring {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 1px solid rgba(255,106,0,0.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .login-ring:nth-child(2) { width: 800px; height: 800px; border-color: rgba(255,106,0,0.03); }
  </style>
</head>
<body>
  <div class="login-ring"></div>
  <div class="login-ring"></div>

  <div class="login-wrap">
    <div class="login-logo">
      <img src="{% static 'images/logo.png' %}" alt="Anupam Bearings"/>
      <div class="login-logo-text">Anupam Bearings</div>
    </div>

    <div class="login-card">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to access the admin dashboard</p>

      {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" autocomplete="username" autofocus placeholder="Enter your username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/">← Back to main site</a> &nbsp;·&nbsp; Anupam Bearings Admin
    </div>
  </div>
</body>
</html>
